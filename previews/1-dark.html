<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>1 — Koyu Lüks</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0D0B11;--bg2:#15121C;--ink:#F4EFF7;--mut:#A89FB5;--gold:#E5B45F;--purple:#B069D6}
body{font-family:"Tajawal",sans-serif;background:var(--bg);color:var(--ink);overflow-x:hidden}
.tag{position:fixed;top:14px;inset-inline-start:14px;z-index:9;background:var(--gold);color:#1a1206;font-weight:700;font-size:12px;padding:6px 12px;border-radius:20px}
.nav{display:flex;align-items:center;justify-content:space-between;padding:20px 22px;position:relative;z-index:5}
.brand{font-weight:900;font-size:22px}.brand b{color:var(--gold)}
.menu{display:flex;gap:10px;align-items:center}
.lng{border:1px solid #ffffff22;border-radius:20px;padding:6px 10px;font-size:13px;color:var(--mut)}
.lng b{color:var(--ink)}
.hero{position:relative;min-height:92vh;padding:30px 22px 60px;display:flex;flex-direction:column;justify-content:center;overflow:hidden}
.glow{position:absolute;border-radius:50%;filter:blur(80px);opacity:.5;z-index:0}
.g1{width:340px;height:340px;background:var(--purple);top:-60px;inset-inline-end:-80px}
.g2{width:300px;height:300px;background:var(--gold);bottom:-80px;inset-inline-start:-90px;opacity:.25}
.wrap{position:relative;z-index:2}
.kick{display:inline-flex;align-items:center;gap:8px;color:var(--gold);font-size:13px;font-weight:700;letter-spacing:.04em;margin-bottom:18px}
.kick i{width:6px;height:6px;border-radius:50%;background:var(--gold);display:inline-block}
h1{font-size:clamp(40px,12vw,84px);line-height:1.08;font-weight:900;letter-spacing:-.01em}
h1 span{color:var(--gold)}
.sub{color:var(--mut);font-size:clamp(15px,4vw,19px);margin:20px 0 28px;max-width:42ch;line-height:1.7}
.cta{display:flex;gap:12px;flex-wrap:wrap}
.b1{background:linear-gradient(135deg,var(--purple),#7d3aa6);color:#fff;font-weight:700;padding:15px 26px;border-radius:40px;font-size:15px;box-shadow:0 12px 30px -10px #b069d6aa}
.b2{border:1px solid #ffffff33;color:var(--ink);padding:15px 24px;border-radius:40px;font-size:15px;font-weight:500}
.shot{position:relative;z-index:2;margin-top:38px;border-radius:24px;overflow:hidden;border:1px solid #ffffff14;box-shadow:0 40px 80px -30px #000;aspect-ratio:16/11}
.shot img{width:100%;height:100%;object-fit:cover}
.badge{position:absolute;bottom:14px;inset-inline-start:14px;background:#0d0b11cc;backdrop-filter:blur(8px);border:1px solid #ffffff1a;border-radius:14px;padding:10px 14px;font-size:13px}
.badge b{color:var(--gold)}
@media(min-width:880px){.hero{display:grid;grid-template-columns:1.1fr .9fr;gap:40px;align-items:center;padding:40px 60px 80px}.shot{margin-top:0;aspect-ratio:4/4.6}h1{font-size:clamp(56px,6vw,86px)}.nav{padding:24px 60px}}
</style></head>
<body>
<div class="tag">١ — Koyu Lüks</div>
<div class="nav"><div class="brand">عفورة<b> بلاست</b></div><div class="menu"><span class="lng"><b>ع</b> · TR · EN</span></div></div>
<section class="hero">
  <span class="glow g1"></span><span class="glow g2"></span>
  <div class="wrap">
    <div class="kick"><i></i> من غازي عنتاب إلى العالم · منذ 2016</div>
    <h1>ننتج التغليف<br><span>لكل منتج</span></h1>
    <p class="sub">من القهوة إلى الصلصات، ومن حليب البودرة إلى المخبوزات — أياً كان قطاعك، ننتج التغليف الذي تحتاجه علامتك، تحت سقف واحد.</p>
    <div class="cta"><a class="b1">اطلب عرض سعر</a><a class="b2">شاهد منتجاتنا</a></div>
  </div>
  <figure class="shot"><img src="../images/products/turkish-coffee.jpg" alt=""><div class="badge"><b>تحت سقف واحد</b> · تصميم · إنتاج · طباعة</div></figure>
</section>
</body></html>
