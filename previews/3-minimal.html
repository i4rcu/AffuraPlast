<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>3 — Net Minimal</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#F4F2EC;--ink:#141414;--mut:#6b6b66;--ac:#6D1F8A}
body{font-family:"Tajawal",sans-serif;background:var(--bg);color:var(--ink);overflow-x:hidden}
.tag{position:fixed;top:14px;inset-inline-start:14px;z-index:9;background:var(--ink);color:#fff;font-weight:700;font-size:12px;padding:6px 12px;border-radius:0}
.nav{display:flex;align-items:center;justify-content:space-between;padding:22px;border-bottom:1px solid #00000018}
.brand{font-weight:900;font-size:21px;letter-spacing:-.01em}
.lng{font-size:13px;color:var(--mut)}.lng b{color:var(--ink);border-bottom:2px solid var(--ac)}
.hero{padding:40px 22px 50px}
.kick{font-size:12px;letter-spacing:.22em;color:var(--mut);font-weight:700;margin-bottom:26px;display:flex;align-items:center;gap:12px}
.kick::before{content:"";width:40px;height:1px;background:var(--ink)}
h1{font-size:clamp(44px,13vw,92px);line-height:1.0;font-weight:900;letter-spacing:-.02em}
h1 u{text-decoration:none;color:var(--ac);box-shadow:inset 0 -14px 0 #6d1f8a22}
.row{display:flex;justify-content:space-between;align-items:flex-end;gap:20px;margin-top:26px;flex-wrap:wrap}
.sub{color:var(--mut);font-size:clamp(15px,4vw,18px);max-width:34ch;line-height:1.7}
.cta{display:flex;gap:10px}
.b1{background:var(--ink);color:#fff;font-weight:700;padding:14px 24px;font-size:15px;border-radius:2px}
.b2{border:1px solid var(--ink);padding:14px 22px;font-size:15px;font-weight:500;border-radius:2px}
.line{height:1px;background:#00000018;margin:34px 0}
.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:#00000018;border:1px solid #00000018}
.cell{background:var(--bg);aspect-ratio:1;overflow:hidden}
.cell img{width:100%;height:100%;object-fit:cover;filter:grayscale(.15)}
.cell.t{display:flex;align-items:center;justify-content:center;font-weight:900;font-size:clamp(22px,6vw,30px);text-align:center;padding:10px}
.cell.t b{color:var(--ac)}
@media(min-width:880px){.nav{padding:26px 60px}.hero{padding:60px 60px}h1{font-size:clamp(64px,8vw,110px)}.grid{grid-template-columns:repeat(5,1fr)}}
</style></head>
<body>
<div class="tag">٣ — Net Minimal</div>
<div class="nav"><div class="brand">عفورة بلاست</div><span class="lng"><b>ع</b> &nbsp; TR &nbsp; EN</span></div>
<section class="hero">
  <div class="kick">منذ 2016 — غازي عنتاب</div>
  <h1>ننتج التغليف<br><u>لكل منتج</u></h1>
  <div class="row">
    <p class="sub">قهوة، صلصات، حليب بودرة، مخبوزات، مشروبات، أغذية مجمّدة — تحت سقف واحد.</p>
    <div class="cta"><a class="b1">اطلب عرض سعر</a><a class="b2">المنتجات</a></div>
  </div>
  <div class="line"></div>
  <div class="grid">
    <figure class="cell"><img src="../images/products/turkish-coffee.jpg" alt=""></figure>
    <figure class="cell"><img src="../images/products/ketchup.jpg" alt=""></figure>
    <figure class="cell t">+15 <b>فئة</b></figure>
    <figure class="cell"><img src="../images/products/humus.jpg" alt=""></figure>
    <figure class="cell"><img src="../images/products/milk-powder.jpg" alt=""></figure>
  </div>
</section>
</body></html>
