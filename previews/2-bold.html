<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>2 — Cesur Renk</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--purple:#6D1F8A;--purple2:#3A0E4D;--lime:#D6FB5A;--ink:#fff}
body{font-family:"Tajawal",sans-serif;background:var(--purple2);color:var(--ink);overflow-x:hidden}
.tag{position:fixed;top:14px;inset-inline-start:14px;z-index:9;background:var(--lime);color:#221;font-weight:700;font-size:12px;padding:6px 12px;border-radius:20px}
.nav{display:flex;align-items:center;justify-content:space-between;padding:20px 22px;position:relative;z-index:5}
.brand{font-weight:900;font-size:22px}.brand b{color:var(--lime)}
.lng{border:1px solid #ffffff33;border-radius:20px;padding:6px 10px;font-size:13px;color:#ffffffbb}.lng b{color:#fff}
.hero{position:relative;min-height:90vh;background:radial-gradient(120% 90% at 80% 0%,var(--purple),var(--purple2));padding:24px 22px 50px;display:flex;flex-direction:column;justify-content:center;overflow:hidden}
.blob{position:absolute;background:var(--lime);border-radius:50%;width:120px;height:120px;opacity:.9;z-index:1}
.blob.b{inset-inline-end:8%;top:12%}.blob.c{width:60px;height:60px;inset-inline-start:14%;bottom:18%;opacity:.7}
.wrap{position:relative;z-index:3}
.kick{display:inline-block;background:#ffffff1a;border:1px solid #ffffff33;color:#fff;font-size:13px;font-weight:700;padding:7px 14px;border-radius:30px;margin-bottom:20px}
h1{font-size:clamp(46px,15vw,110px);line-height:.96;font-weight:900;letter-spacing:-.02em;text-transform:none}
h1 .hl{color:var(--lime)}
.sub{font-size:clamp(15px,4vw,19px);color:#ffffffcc;margin:22px 0 28px;max-width:40ch;line-height:1.7}
.cta{display:flex;gap:12px;flex-wrap:wrap}
.b1{background:var(--lime);color:#221;font-weight:900;padding:16px 28px;border-radius:40px;font-size:16px}
.b2{border:2px solid #fff;color:#fff;padding:15px 26px;border-radius:40px;font-size:15px;font-weight:700}
.strip{position:relative;z-index:3;margin-top:40px;display:flex;gap:12px;overflow:hidden}
.card{flex:0 0 46%;aspect-ratio:3/4;border-radius:18px;overflow:hidden;border:3px solid var(--lime)}
.card:nth-child(2){border-color:#fff;transform:translateY(14px)}
.card img{width:100%;height:100%;object-fit:cover}
@media(min-width:880px){.hero{display:grid;grid-template-columns:1.15fr .85fr;gap:40px;align-items:center;padding:40px 60px}.strip{margin-top:0}.nav{padding:24px 60px}h1{font-size:clamp(60px,7vw,104px)}}
</style></head>
<body>
<div class="tag">٢ — Cesur Renk</div>
<div class="nav"><div class="brand">عفورة<b> بلاست</b></div><span class="lng"><b>ع</b> · TR · EN</span></div>
<section class="hero">
  <span class="blob b"></span><span class="blob c"></span>
  <div class="wrap">
    <span class="kick">منذ 2016 · غازي عنتاب</span>
    <h1>ننتج <span class="hl">التغليف</span><br>لكل منتج</h1>
    <p class="sub">كل ما تتخيله من عبوات — قهوة، صلصات، حليب بودرة، مخبوزات، مشروبات — ننتجه تحت سقف واحد.</p>
    <div class="cta"><a class="b1">اطلب عرض سعر</a><a class="b2">شاهد منتجاتنا</a></div>
  </div>
  <div class="strip">
    <figure class="card"><img src="../images/products/espresso-pouch.jpg" alt=""></figure>
    <figure class="card"><img src="../images/products/frozen-corn.jpg" alt=""></figure>
  </div>
</section>
</body></html>
